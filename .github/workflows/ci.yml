name: CI

# Runs the correctness suite on every push to main and every PR.
# Deliberately minimal: it only runs `pytest` — never the (slow) training demo.
# The tests themselves are the point of Glassbox, so keeping them green in CI is
# what backs the README's "correctness checks, not just it runs" promise.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }}

      # Install the CPU-only torch wheel explicitly: the default PyPI torch wheel
      # on Linux ships CUDA (~2 GB) which we neither need nor want in CI.
      - name: Install CPU-only PyTorch
        run: uv pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package + test deps
        run: uv pip install -e . pytest

      - name: Run the test suite
        run: uv run pytest -q
